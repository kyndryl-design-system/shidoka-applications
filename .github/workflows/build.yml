name: 'Build'

on:
  pull_request:
  workflow_call:

env:
  GH_TOKEN: '${{ secrets.GH_TOKEN }}'

jobs:
  Lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

  Build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build component bundles
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: dist

  Build_Storybook:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build storybook
        run: npm run build-storybook

      # - name: Upload build-storybook artifact
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: build-storybook-artifact
      #     path: storybook-static

  Test_Browser:
    # needs: [Build_Storybook]
    name: Test (${{ matrix.browser }})
    timeout-minutes: 30
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright (${{ matrix.browser }})
        run: npx playwright install --with-deps ${{ matrix.browser }}

      # - name: Download build-storybook artifact
      #   uses: actions/download-artifact@v4
      #   with:
      #     name: build-storybook-artifact
      #     path: storybook-static

      # - name: Serve Storybook and run tests
      #   run: |
      #     npx concurrently -k -s first -n "SB,TEST" -c "magenta,blue" \
      #       "npx http-server storybook-static --port 6006 --silent" \
      #       "npx wait-on tcp:6006 && npm run test"

      - name: Run storybook tests (${{ matrix.browser }})
        env:
          VITEST_BROWSER: ${{ matrix.browser }}
        run: |
          echo "Running Storybook tests in $VITEST_BROWSER"
          npm run test:storybook:ci 2>&1 | tee /tmp/test.log || {
            if grep -q "dynamically imported module" /tmp/test.log; then
              echo "Transient import error detected in $VITEST_BROWSER, retrying..."
              npm run test:storybook:ci
            else
              exit 1
            fi
          }

  Test_Unit:
    name: Test (unit)
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run unit tests
        run: npm run test:unit

  Test:
    name: Test
    if: ${{ always() }}
    needs: [Test_Browser, Test_Unit]
    runs-on: ubuntu-latest
    steps:
      - name: Report test job results
        run: |
          echo "Browser tests result: ${{ needs.Test_Browser.result }}"
          echo "Unit tests result: ${{ needs.Test_Unit.result }}"

          if [ "${{ needs.Test_Browser.result }}" != "success" ] || [ "${{ needs.Test_Unit.result }}" != "success" ]; then
            echo "One or more test jobs did not succeed."
            exit 1
          fi
